<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TagMaster v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;
  --border:#2a2f4a;--border2:#3a4060;
  --text:#e8eaf6;--text2:#8892b0;--text3:#4a5270;
  --accent:#7c6af7;--accent2:#5a4fd4;
  --green:#4ade80;--green-bg:#0a2018;--green-bd:#1a4a2a;
  --red:#f87171;--red-bg:#2a0f0f;--red-bd:#4a1a1a;
  --amber:#fbbf24;--amber-bg:#1e1500;
  --teal:#2dd4bf;
  --mono:'JetBrains Mono','Courier New',monospace;
  --sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.6;overflow-x:hidden;}
.app{max-width:680px;margin:0 auto;padding:0 .875rem;display:flex;flex-direction:column;min-height:100vh;}
.screen{display:none;flex-direction:column;flex:1;padding:1.25rem 0 2rem;}
.screen.active{display:flex;}

/* ── TOPNAV ── */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:.55rem .875rem;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:.875rem;}
.nav-left{display:flex;align-items:center;gap:.4rem;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:500;white-space:nowrap;}
.b-streak{background:#1e1200;color:var(--amber);border:1px solid #3a2400;}
.b-xp{background:#100a30;color:var(--accent);border:1px solid #221550;}
.b-lv{font-size:11px;color:var(--teal);font-family:var(--mono);}

/* ── XP BAR ── */
.xp-wrap{margin-bottom:.875rem;}
.xp-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.xp-row span{font-size:10px;color:var(--text3);font-family:var(--mono);}
.xp-track{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .6s ease;}

/* ── HOME ── */
.home-hero{text-align:center;padding:.875rem 0 1.25rem;}
.logo{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--accent);letter-spacing:-1px;margin-bottom:3px;}
.logo span{color:var(--teal);}
.tagline{font-size:11px;color:var(--text3);font-family:var(--mono);}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;font-family:var(--mono);margin-bottom:.5rem;}

/* ── TOPIC CHIPS ── */
.chip-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.875rem;}
.t-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:99px;
  background:var(--bg2);border:1px solid var(--border);
  cursor:pointer;transition:all .12s;
  font-size:11px;font-weight:500;color:var(--text2);
  font-family:var(--mono);white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.t-chip:hover{border-color:var(--border2);color:var(--text);}
.t-chip.sel{border-color:var(--accent);background:#14103a;color:var(--accent);}
.t-chip .cnt{font-size:9px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:99px;border:1px solid var(--border);}
.t-chip.sel .cnt{color:#9080ff;}

/* ── MODE ROW ── */
.mode-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:.875rem;}
.m-btn{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:.55rem .25rem;cursor:pointer;text-align:center;transition:all .12s;-webkit-tap-highlight-color:transparent;}
.m-btn:hover{border-color:var(--border2);}
.m-btn.sel{border-color:var(--teal);background:#081a18;}
.m-btn .mi{font-size:15px;line-height:1;}
.m-btn .mn{font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px;}
.m-btn.sel .mn{color:var(--teal);}

.start-btn{width:100%;padding:.875rem;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.start-btn:hover{background:var(--accent2);}
.start-btn:active{transform:scale(.98);}

/* ── SESSION INFO ── */
.sess-info{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:5px 10px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;margin-bottom:.75rem;
  font-family:var(--mono);font-size:11px;color:var(--text3);
}
.si-topic{color:var(--teal);}
.si-mode{color:var(--amber);}

/* ── PROGRESS ── */
.prog-wrap{margin-bottom:.875rem;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.prog-row span{font-size:10px;color:var(--text3);font-family:var(--mono);}
.prog-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;border:1px solid var(--border);}
.prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s ease;}

/* ── QCARD ── */
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.125rem;margin-bottom:.75rem;}
.qt-tag{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;margin-bottom:.75rem;letter-spacing:.03em;}
.qt-flash{background:#0a2018;color:var(--green);border:1px solid #1a4a2a;}
.qt-blank{background:#100a30;color:var(--accent);border:1px solid #221550;}
.qt-type{background:#1e1200;color:var(--amber);border:1px solid #3a2400;}
.q-text{font-size:15px;font-weight:500;color:var(--text);margin-bottom:.875rem;line-height:1.65;}
.code-blk{
  background:#07090e;border:1px solid var(--border);border-radius:9px;
  padding:.75rem 1rem;font-family:var(--mono);font-size:12.5px;
  line-height:1.9;margin-bottom:.875rem;color:var(--text2);
  white-space:pre-wrap;word-break:break-all;overflow-x:auto;
}
.bslot{display:inline-block;background:#14103a;color:var(--accent);border:1.5px dashed #5040c0;border-radius:4px;padding:0 8px;min-width:52px;text-align:center;font-weight:700;font-size:12px;}

/* ── OPTS ── */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.opts.col1{grid-template-columns:1fr;}
.opt{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.7rem .875rem;font-family:var(--mono);font-size:12.5px;color:var(--text);cursor:pointer;transition:all .1s;text-align:left;line-height:1.4;-webkit-tap-highlight-color:transparent;}
.opt:hover:not(:disabled){border-color:var(--border2);background:var(--bg4);}
.opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.opt:disabled{cursor:default;}

/* ── TYPE INPUT ── */
.type-row{display:flex;gap:6px;}
/* font-size 16px = iOS 자동 줌 방지 핵심 */
.t-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.7rem .875rem;font-family:var(--mono);font-size:16px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;min-width:0;}
.t-inp:focus{border-color:var(--accent);}
.t-inp.correct{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.t-inp.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.t-inp:disabled{cursor:default;}
.ok-btn{padding:.7rem .875rem;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.ok-btn:hover{background:var(--accent2);}

/* ── FEEDBACK ── */
.fb{padding:.65rem .875rem;border-radius:9px;font-size:12px;line-height:1.5;margin-bottom:.6rem;display:none;font-family:var(--mono);}
.fb.show{display:block;}
.fb.ok{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.fb.ng{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);}

/* ── PREV REVIEW ── */
.prev-rev{padding:.55rem .875rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--text3);display:none;margin-bottom:.6rem;}
.prev-rev.show{display:block;}
.pr-lbl{font-size:9px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;}
.pr-ok{color:var(--green);}
.pr-ng{color:var(--red);}

/* ── NAV BTNS ── */
.next-btn{display:none;width:100%;padding:.7rem;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:9px;font-family:var(--mono);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;margin-bottom:.55rem;-webkit-tap-highlight-color:transparent;}
.next-btn.show{display:block;}
.next-btn:hover{background:var(--bg4);border-color:var(--accent);}
.q-actions{display:flex;gap:6px;}
.nav-btn{flex:1;padding:.6rem;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:var(--mono);font-size:11px;transition:all .12s;-webkit-tap-highlight-color:transparent;}
.nav-btn:hover{border-color:var(--border2);color:var(--text);}
.nav-btn:disabled{opacity:.3;cursor:default;}

/* ── RESULT ── */
.res-hero{text-align:center;padding:1.5rem 0 .875rem;}
.res-emoji{font-size:50px;margin-bottom:.35rem;}
.res-title{font-family:var(--mono);font-size:20px;font-weight:700;}
.res-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:1.125rem 0;}
.res-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:.875rem;text-align:center;}
.res-val{font-family:var(--mono);font-size:22px;font-weight:700;}
.rv-g{color:var(--green);}
.rv-a{color:var(--accent);}
.rv-o{color:var(--amber);}
.res-lbl{font-size:10px;color:var(--text3);margin-top:3px;}
.again-btn{width:100%;padding:.875rem;margin-bottom:.55rem;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;}
.again-btn:hover{background:var(--accent2);}
.home-btn{width:100%;padding:.65rem;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:12px;font-family:var(--mono);font-size:12px;cursor:pointer;}
.home-btn:hover{border-color:var(--border2);color:var(--text);}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.modal-bg.show{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--accent);border-radius:14px;padding:1.75rem 1.5rem;text-align:center;max-width:270px;width:90%;animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-icon{font-size:42px;margin-bottom:.5rem;}
.modal-title{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:.875rem;}
.modal-ok{padding:.6rem 1.5rem;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;}
.combo-flash{position:fixed;top:64px;right:14px;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--amber);background:var(--amber-bg);border:1px solid #3a2400;padding:4px 10px;border-radius:7px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:98;}
.combo-flash.show{opacity:1;}

@media(max-width:430px){
  .mode-row{grid-template-columns:repeat(4,1fr);}
  .opts{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <div class="modal-icon">🏆</div>
    <div class="modal-title" id="modalTitle">레벨 업!</div>
    <div class="modal-sub" id="modalSub"></div>
    <button class="modal-ok" onclick="closeModal()">계속하기 →</button>
  </div>
</div>
<div class="combo-flash" id="comboFlash"></div>

<!-- ═══ HOME ═══ -->
<div class="screen active" id="homeScreen">
  <div class="topnav">
    <div class="nav-left">
      <span class="badge b-streak">🔥 <span id="h-streak">0</span>일</span>
      <span class="badge b-xp">⚡ <span id="h-xp">0</span> XP</span>
    </div>
    <span class="b-lv" id="h-lv">Lv.1 · 초보 마크업러</span>
  </div>
  <div class="xp-wrap">
    <div class="xp-row">
      <span id="h-lvfull">Lv.1 · 초보 마크업러</span>
      <span><span id="h-xpcurr">0</span>/<span id="h-xpmax">100</span> XP</span>
    </div>
    <div class="xp-track"><div class="xp-fill" id="h-xpbar" style="width:0%"></div></div>
  </div>

  <div class="home-hero">
    <div class="logo">Tag<span>Master</span></div>
    <div class="tagline">// HTML · CSS 기초 완전 정복</div>
  </div>

  <div class="sec-label">학습 범위</div>
  <div class="chip-wrap" id="chipWrap"></div>

  <div class="sec-label">문제 유형</div>
  <div class="mode-row">
    <div class="m-btn sel" data-mode="mixed" onclick="pickMode(this,'mixed')"><div class="mi">🎲</div><div class="mn">혼합</div></div>
    <div class="m-btn" data-mode="flashcard" onclick="pickMode(this,'flashcard')"><div class="mi">🃏</div><div class="mn">플래시카드</div></div>
    <div class="m-btn" data-mode="blank" onclick="pickMode(this,'blank')"><div class="mi">⬜</div><div class="mn">빈칸</div></div>
    <div class="m-btn" data-mode="typein" onclick="pickMode(this,'typein')"><div class="mi">⌨️</div><div class="mn">직접입력</div></div>
  </div>
  <button class="start-btn" onclick="startSession()">학습 시작 →</button>
</div>

<!-- ═══ QUIZ ═══ -->
<div class="screen" id="quizScreen">
  <div class="topnav">
    <div class="nav-left">
      <span class="badge b-streak">🔥 <span id="q-streak">0</span>일</span>
      <span class="badge b-xp">⚡ Lv.<span id="q-lv">1</span> · <span id="q-xp">0</span>xp</span>
    </div>
  </div>

  <!-- 항상 노출: 학습 범위 + 유형 -->
  <div class="sess-info">
    <span>📚</span>
    <span class="si-topic" id="si-topic">전체</span>
    <span style="color:var(--border2)">·</span>
    <span class="si-mode" id="si-mode">혼합 모드</span>
  </div>

  <div class="prog-wrap">
    <div class="prog-row">
      <span>진행률</span>
      <span><span id="q-curr">1</span>/<span id="q-total">15</span></span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="q-progfill" style="width:0%"></div></div>
  </div>

  <div class="qcard">
    <span class="qt-tag qt-flash" id="qtTag">🃏 플래시카드</span>
    <div class="q-text" id="qText"></div>
    <div class="code-blk" id="qCode" style="display:none"></div>
    <div class="opts" id="qOpts"></div>
    <div class="type-row" id="qTypeRow" style="display:none">
      <input class="t-inp" id="tInp" placeholder="여기에 입력..." autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off"/>
      <button class="ok-btn" onclick="submitType()">확인</button>
    </div>
    <div id="qHint" style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:5px;"></div>
  </div>

  <div class="fb" id="fb"></div>
  <div class="prev-rev" id="prevRev"><div class="pr-lbl">이전 풀이 기록</div><div id="prevRevBody"></div></div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">다음 문제 →</button>
  <div class="q-actions">
    <button class="nav-btn" id="prevBtn" onclick="prevQ()" disabled>← 이전</button>
    <button class="nav-btn" onclick="goHome()">🏠 홈</button>
  </div>
</div>

<!-- ═══ RESULT ═══ -->
<div class="screen" id="resultScreen">
  <div class="topnav">
    <div class="nav-left">
      <span class="badge b-streak">🔥 <span id="r-streak">0</span>일</span>
      <span class="badge b-xp">⚡ <span id="r-xp">0</span> XP</span>
    </div>
  </div>
  <div class="res-hero">
    <div class="res-emoji" id="r-emoji">🎉</div>
    <div class="res-title" id="r-title">세션 완료!</div>
    <div class="res-sub" id="r-sub"></div>
  </div>
  <div class="res-grid">
    <div class="res-box"><div class="res-val rv-g" id="r-correct">0</div><div class="res-lbl">정답</div></div>
    <div class="res-box"><div class="res-val rv-a" id="r-gained">+0</div><div class="res-lbl">획득 XP</div></div>
    <div class="res-box"><div class="res-val rv-o" id="r-combo">0</div><div class="res-lbl">최대 콤보</div></div>
  </div>
  <button class="again-btn" onclick="startSession()">같은 설정으로 다시 →</button>
  <button class="home-btn" onclick="goHome()">홈으로</button>
</div>

</div><!-- .app -->
<script>
/* ════════ LEVELS ════════ */
const LEVELS=[
  {name:'초보 마크업러',max:100},
  {name:'태그 수련생',max:250},
  {name:'CSS 탐험가',max:500},
  {name:'엘리먼트 기사',max:850},
  {name:'레이아웃 마법사',max:1300},
  {name:'웹 장인',max:2000},
  {name:'HTML 현자',max:9999},
];
const SL=15, SK='tm-v5';

/* ════════ TOPICS ════════ */
const TOPICS=[
  {id:'all',    label:'⚡ 전체'},
  {id:'h-struct',label:'🏗 기본구조',    desc:'html·head·body·title·meta·link'},
  {id:'h-text',  label:'✍️ 텍스트/제목', desc:'h1~h6·p·span·strong·br·hr·blockquote'},
  {id:'h-list',  label:'📋 목록·표',     desc:'ul·ol·li·table·tr·td·th·thead·tbody'},
  {id:'h-media', label:'🖼 멀티미디어',  desc:'img·audio·video·source·track'},
  {id:'h-form',  label:'📝 폼요소',      desc:'form·input·button·label·select·textarea·fieldset'},
  {id:'h-sem',   label:'🧩 시맨틱',      desc:'header·nav·main·section·article·aside·footer'},
  {id:'c-color', label:'🎨 색상·배경',   desc:'color·background-*·opacity'},
  {id:'c-text',  label:'🔤 텍스트스타일',desc:'font-*·text-*·line-height'},
  {id:'c-box',   label:'📦 박스모델',    desc:'width·height·margin·padding·border·border-radius'},
  {id:'c-layout',label:'🔲 레이아웃',    desc:'display·position·float·flex·grid·z-index'},
  {id:'c-anim',  label:'✨ 애니메이션',  desc:'transition·transform·animation·keyframes'},
];

/* ════════ QUESTION BANK ════════ */
/* p:'h' = 높은 중요도 / p:'l' = 낮은 중요도(전체 모드에서 30% 확률) */
const QB=[
/* ━━━━ h-struct: html·head·body·title·meta·link ━━━━ */

/* ════════ STATE ════════ */
let G={
  xp:0,level:0,streak:0,lastDate:null,
  totalQ:0,totalCorrect:0,
  topic:'all',mode:'mixed',
  session:{qs:[],idx:0,correct:0,xpGained:0,combo:0,maxCombo:0,history:[]},
  pendingLevelUp:false,answered:false,
};

/* ════════ SAVE/LOAD ════════ */
function saveG(){try{sessionStorage.setItem(SK,JSON.stringify(G));}catch(e){}}
function loadG(){
  try{const r=sessionStorage.getItem(SK);if(r){const d=JSON.parse(r);G={...G,...d};}}catch(e){}
}

/* ════════ UTILS ════════ */
function $(id){return document.getElementById(id);}
function txt(id,v){const e=$(id);if(e)e.textContent=v;}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function normQ(q){
  const n={
    t:q.t||'fc',c:q.c||'misc',p:q.p||'h',
    q:q.q||'',a:q.a||'',
    o:Array.isArray(q.o)?q.o:[],
    ac:Array.isArray(q.ac)?q.ac:[q.a||''],
    cd:q.cd||'',bk:q.bk||'',hint:q.hint||''
  };
  if((n.t==='fc'||n.t==='bk')&&n.o.length<2){
    n.o=shuffle([n.a,'<div>','color','없음']).slice(0,4);
  }
  return n;
}
function calcLv(xp){
  let lv=0;
  for(let i=0;i<LEVELS.length-1;i++){if(xp>=LEVELS[i].max)lv=i+1;else break;}
  return lv;
}
function xpInLv(xp,lv){
  const base=lv>0?LEVELS[lv-1].max:0;
  const top=LEVELS[lv].max===9999?base+1000:LEVELS[lv].max;
  return{curr:xp-base,range:top-base};
}

/* ════════ UI ════════ */
function refreshUI(){
  const lv=G.level;
  const lvd=LEVELS[Math.min(lv,LEVELS.length-1)];
  const x=xpInLv(G.xp,lv);
  const pct=Math.min(100,Math.round(x.curr/x.range*100));
  const lvstr=`Lv.${lv+1} · ${lvd.name}`;
  txt('h-xp',G.xp);txt('h-streak',G.streak);
  txt('h-lv',lvstr);txt('h-lvfull',lvstr);
  txt('h-xpcurr',x.curr);txt('h-xpmax',x.range);
  const b=$('h-xpbar');if(b)b.style.width=pct+'%';
  txt('q-streak',G.streak);txt('q-lv',lv+1);txt('q-xp',G.xp);
  txt('r-streak',G.streak);txt('r-xp',G.xp);
}

/* ════════ CHIPS ════════ */
function buildChips(){
  const wrap=$('chipWrap');wrap.innerHTML='';
  TOPICS.forEach(tp=>{
    const n=tp.id==='all'?QB.length:QB.filter(q=>q.c===tp.id).length;
    const chip=document.createElement('button');
    chip.className='t-chip'+(G.topic===tp.id?' sel':'');
    chip.innerHTML=`${tp.label} <span class="cnt">${n}</span>`;
    chip.onclick=()=>{
      document.querySelectorAll('.t-chip').forEach(c=>c.classList.remove('sel'));
      chip.classList.add('sel');G.topic=tp.id;
    };
    wrap.appendChild(chip);
  });
}

/* ════════ HOME ════════ */
function pickMode(el,m){
  document.querySelectorAll('.m-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');G.mode=m;
}

/* ════════ SCREEN ════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
    s.style.display='';
  });
  const el=$(id);
  if(!el)return;
  /* iOS Safari 렌더링 버그 워크어라운드 */
  el.style.display='flex';
  requestAnimationFrame(()=>{
    el.classList.add('active');
    window.scrollTo(0,0);
  });
}
function goHome(){refreshUI();showScreen('homeScreen');saveG();}

/* ════════ STREAK ════════ */
function checkStreak(){
  const today=new Date().toDateString();
  if(G.lastDate===today)return;
  const yd=new Date(Date.now()-86400000).toDateString();
  G.streak=(G.lastDate===yd)?G.streak+1:1;
  G.lastDate=today;
}

/* ════════ SESSION ════════ */
function topicName(id){const t=TOPICS.find(x=>x.id===id);return t?t.label.replace(/^[^\s]+\s/,''):id;}
function modeName(m){return{mixed:'혼합 모드',flashcard:'플래시카드',blank:'빈칸 채우기',typein:'직접 입력'}[m]||m;}

function startSession(){
  let pool;
  if(G.topic==='all'){
    pool=QB.filter(q=>q.p==='h'||Math.random()<0.3);
  }else{
    pool=QB.filter(q=>q.c===G.topic);
  }
  if(G.mode!=='mixed') pool=pool.filter(q=>q.t==={mixed:'mixed',flashcard:'fc',blank:'bk',typein:'ty'}[G.mode]);
  if(!pool.length) pool=QB;
  const qs=shuffle(pool).map(normQ).filter(q=>q.q&&q.a).slice(0,SL);
  G.session={qs,idx:0,correct:0,xpGained:0,combo:0,maxCombo:0,history:[]};
  G.answered=false;G.pendingLevelUp=false;
  checkStreak();refreshUI();
  txt('si-topic',topicName(G.topic));
  txt('si-mode',modeName(G.mode));
  showScreen('quizScreen');
  renderQ();saveG();
}

/* ════════ RENDER Q ════════ */
function renderQ(){
  G.answered=false;
  const s=G.session;const q=s.qs[s.idx];const total=s.qs.length;
  txt('q-curr',s.idx+1);txt('q-total',total);
  $('q-progfill').style.width=Math.round(s.idx/total*100)+'%';
  $('prevBtn').disabled=(s.idx===0);

  const tmap={fc:'🃏 플래시카드',bk:'⬜ 빈칸 채우기',ty:'⌨️ 직접 입력'};
  const cmap={fc:'qt-flash',bk:'qt-blank',ty:'qt-type'};
  const tt=$('qtTag');
  tt.textContent=tmap[q.t]||q.t;tt.className='qt-tag '+(cmap[q.t]||'qt-flash');

  $('qText').textContent=q.q;

  const codeEl=$('qCode'),optsEl=$('qOpts'),typeRow=$('qTypeRow'),ti=$('tInp');
  codeEl.style.display='none';
  optsEl.innerHTML='';optsEl.className='opts';
  typeRow.style.display='none';
  ti.value='';ti.disabled=false;ti.className='t-inp';

  if(q.t==='bk'){
    codeEl.style.display='block';
    codeEl.innerHTML=renderCode(q.cd);
  }
  if(q.t==='fc'||q.t==='bk'){
    const opts=shuffle(q.o);
    if(opts.length<=2)optsEl.classList.add('col1');
    opts.forEach(o=>{
      const b=document.createElement('button');
      b.className='opt';b.textContent=o;
      b.onclick=()=>pickOpt(b,o,q.a);
      optsEl.appendChild(b);
    });
  }else{
    typeRow.style.display='flex';
    setTimeout(()=>{
      ti.focus();
      ti.scrollIntoView({behavior:'smooth',block:'nearest'});
    },120);
  }
  if(q.hint)$('qHint').textContent='💡 '+q.hint;
  else $('qHint').textContent='';

  $('fb').className='fb';
  $('nextBtn').className='next-btn';
  $('prevRev').className='prev-rev';

  const hist=s.history[s.idx];
  if(hist) showHistFB(hist,q);
  refreshUI();
}

function renderCode(cd){
  let h=cd.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
         .replace(/___/g,'<span class="bslot">???</span>');
  h=h.replace(/(&lt;\/?)([\w!]+)(&gt;)/g,'<span style="color:#c792ea">$1$2$3</span>')
     .replace(/([\w-]+)(=)(&quot;[^&]*&quot;)/g,'<span style="color:#82aaff">$1</span>$2<span style="color:#c3e88d">$3</span>');
  return h.replace(/\n/g,'<br>');
}

function showHistFB(hist,q){
  G.answered=true;
  const fb=$('fb');
  if(hist.ok){
    fb.className='fb ok show';fb.innerHTML='✓ 정답 (이전에 맞힘)';
  }else{
    fb.className='fb ng show';
    fb.innerHTML=`✗ 오답 — 정답: <strong>${q.a||'데이터 없음'}</strong>`;
  }
  const pr=$('prevRev');pr.className='prev-rev show';
  $('prevRevBody').innerHTML=`<span class="pr-lbl">내 답: </span><span class="${hist.ok?'pr-ok':'pr-ng'}">${hist.ya||'(없음)'}</span>`;
  if(q.t==='fc'||q.t==='bk'){
    document.querySelectorAll('.opt').forEach(b=>{
      b.disabled=true;
      if(b.textContent===q.a)b.classList.add('correct');
      if(b.textContent===hist.ya&&!hist.ok)b.classList.add('wrong');
    });
  }else{
    const ti=$('tInp');ti.value=hist.ya;ti.disabled=true;
    ti.classList.add(hist.ok?'correct':'wrong');
  }
  $('nextBtn').className='next-btn show';
}

/* ════════ ANSWER ════════ */
function pickOpt(btn,sel,correct){
  if(G.answered)return;G.answered=true;
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
  });
  if(sel!==correct)btn.classList.add('wrong');
  recHist(sel,sel===correct);
  handleRes(sel===correct,correct);
}

function submitType(){
  if(G.answered)return;
  const q=G.session.qs[G.session.idx];
  const raw=$('tInp').value;
  const val=raw.trim().toLowerCase();
  const acc=(q.ac||[q.a]).map(a=>(a||'').toLowerCase().trim());
  /* 꺾쇠 제거 후도 비교 */
  const valBare=val.replace(/^<|\/?>$/g,'').trim();
  const ok=acc.some(a=>{
    const abare=a.replace(/^<|\/?>$/g,'').trim();
    return a===val||abare===valBare||abare===val||a===valBare;
  });
  G.answered=true;
  const ti=$('tInp');ti.disabled=true;ti.classList.add(ok?'correct':'wrong');
  recHist(raw.trim(),ok);
  handleRes(ok,q.a);
}

function recHist(ya,ok){G.session.history[G.session.idx]={ya,ok};}

function handleRes(ok,correct){
  const s=G.session;const fb=$('fb');
  if(ok){
    s.combo++;s.maxCombo=Math.max(s.maxCombo,s.combo);
    const bonus=s.combo>=3?Math.floor(s.combo/3)*5:0;
    const xp=10+bonus;
    G.xp+=xp;G.totalCorrect++;G.totalQ++;s.correct++;s.xpGained+=xp;
    fb.className='fb ok show';
    fb.innerHTML=`✓ 정답! <strong>+${xp} XP</strong>${bonus?` 🔥 콤보 +${bonus}`:''}`;
    if(s.combo>=3){
      const ef=$('comboFlash');ef.textContent=`🔥 ${s.combo} COMBO!`;
      ef.classList.add('show');setTimeout(()=>ef.classList.remove('show'),1500);
    }
    if(calcLv(G.xp)>G.level){G.level=calcLv(G.xp);G.pendingLevelUp=true;}
  }else{
    s.combo=0;G.totalQ++;
    fb.className='fb ng show';
    fb.innerHTML=`✗ 오답. 정답: <strong>${correct!=null&&correct!==''?correct:'데이터 없음'}</strong>`;
  }
  $('nextBtn').className='next-btn show';
  refreshUI();saveG();
}

/* ════════ NAV ════════ */
function nextQ(){
  if(G.pendingLevelUp){G.pendingLevelUp=false;showLvUp();return;}
  G.session.idx++;
  if(G.session.idx>=G.session.qs.length){endSess();return;}
  renderQ();
}
function prevQ(){
  if(G.session.idx<=0)return;
  G.session.idx--;
  renderQ();
}

/* ════════ END ════════ */
function endSess(){
  const s=G.session;const pct=Math.round(s.correct/s.qs.length*100);
  txt('r-emoji',pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'😅');
  txt('r-title','세션 완료!');
  txt('r-sub',`${s.qs.length}문제 중 ${s.correct}개 정답 (${pct}%)`);
  txt('r-correct',`${s.correct}/${s.qs.length}`);
  txt('r-gained',`+${s.xpGained}`);
  txt('r-combo',s.maxCombo);
  showScreen('resultScreen');refreshUI();saveG();
}

/* ════════ LEVELUP ════════ */
function showLvUp(){
  const lv=G.level;const name=LEVELS[Math.min(lv,LEVELS.length-1)].name;
  txt('modalTitle','레벨 업! 🎉');
  txt('modalSub',`Lv.${lv+1} · ${name} 달성!`);
  $('modalBg').classList.add('show');
}
function closeModal(){
  $('modalBg').classList.remove('show');
  G.session.idx++;
  if(G.session.idx>=G.session.qs.length){endSess();return;}
  renderQ();saveG();
}

/* ════════ KEYBOARD ════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(!G.answered){
      const tr=$('qTypeRow');
      if(tr&&tr.style.display!=='none')submitType();
    }else{
      const nb=$('nextBtn');
      if(nb&&nb.classList.contains('show'))nextQ();
    }
  }
});

/* ════════ INIT ════════ */
loadG();
buildChips();
refreshUI();
/* mode 버튼 복원 */
document.querySelectorAll('.m-btn').forEach(b=>{
  const mMap={mixed:'mixed',flashcard:'fc',blank:'bk',typein:'ty'};
  b.classList.toggle('sel',b.dataset.mode===G.mode);
});
</script>
</body>
</html>
